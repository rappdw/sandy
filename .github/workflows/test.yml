name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7

      - name: Verify Docker
        run: docker info

      # Cache the final Docker image as a tarball between runs.
      # sandy-claude-code includes all sandy-base layers, so one save covers both.
      # Cache key is based on the sandy script hash (Dockerfiles are inline).
      - name: Cache Docker image
        id: cache-image
        uses: actions/cache@v6
        with:
          path: /tmp/sandy-images
          key: sandy-image-${{ hashFiles('sandy') }}

      - name: Load cached image
        if: steps.cache-image.outputs.cache-hit == 'true'
        run: docker load < /tmp/sandy-images/sandy-claude-code.tar

      - name: Build images
        if: steps.cache-image.outputs.cache-hit != 'true'
        run: ./sandy --build-only

      - name: Save image to cache
        if: steps.cache-image.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/sandy-images
          docker save sandy-claude-code:latest > /tmp/sandy-images/sandy-claude-code.tar

      - name: Run tests
        run: ./test/run-tests.sh

  # Egress proxy (M2.7) Go unit + loopback tests. Separate job: pure Go, no
  # Docker, so it gives fast feedback in parallel with the image-build job above.
  proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: proxy/go.mod
          cache-dependency-path: proxy/go.sum

      - name: gofmt
        working-directory: proxy
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        working-directory: proxy
        run: go vet ./...

      - name: go test -race
        working-directory: proxy
        run: go test -race ./...

      - name: static build
        working-directory: proxy
        run: CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o /tmp/sandy-proxy .
